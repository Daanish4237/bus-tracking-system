<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bus Tracking System</title>
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BusTracker">
  <link rel="apple-touch-icon" href="/icon.svg">
  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <!-- Register service worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</head>
<body>
  <div class="container">
    <header>
      <h1>Bus Tracking System</h1>
      <p class="subtitle">Track your bus in real-time</p>
    </header>

    <main>
      <!-- Route Viewer Section -->
      <section class="route-viewer-section">
        <div class="section-header">
          <h2>Available Routes</h2>
        </div>
        <div id="route-list" class="route-list-container">
          <!-- Route list will be populated here by RouteViewer -->
        </div>
      </section>

      <!-- Route Stops Section -->
      <section class="route-stops-section">
        <div id="route-stops" class="route-stops-container">
          <!-- Route stops will be populated here by RouteViewer -->
        </div>
      </section>

      <!-- Stop Selector Section -->
      <section class="stop-selector-section">
        <div class="section-header">
          <h2>Select Your Drop-off Stop</h2>
        </div>
        <div id="stop-selector" class="stop-selector-container">
          <!-- Stop selector will be populated here by StopSelector -->
        </div>
      </section>

      <!-- Bus Tracker Section -->
      <section class="bus-tracker-section">
        <div class="section-header">
          <h2>Live Bus Tracking</h2>
        </div>
        <div id="bus-tracker" class="bus-tracker-container">
          <!-- Bus tracker will be populated here by BusTrackerDisplay -->
        </div>
      </section>

      <!-- Map Section -->
      <section class="map-section">
        <div class="section-header">
          <h2>Route Map</h2>
        </div>
        <div id="route-map" class="route-map-container"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2024 Bus Tracking System. All rights reserved.</p>
    </footer>
  </div>

  <!-- Application Scripts -->
  <script type="module" src="src/main.ts"></script>
</body>
</html>
